<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <input id="username" type="text" placeholder="Username">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="nav glass">
  <div class="logo">BHUMIXCORE</div>
  <a href="index.html" class="btn secondary">Home</a>
</div>

<div style="display:flex; justify-content:center; align-items:center; height:80vh;">

  <div class="card glass" style="width:300px; text-align:center;">

    <h2>Login 🔐</h2>

    <input type="text" placeholder="Username" style="width:90%; padding:10px; margin:10px; border-radius:8px; border:none;">

    <input type="password" placeholder="Password" style="width:90%; padding:10px; margin:10px; border-radius:8px; border:none;">

    <button class="btn primary" style="width:90%;">Login</button>

  </div>

</div>

</body>
</html>
<script>
function login(){
  let user = document.getElementById("username").value;
  let pass = document.getElementById("password").value;

  if(user === "admin" && pass === "1234"){
    alert("Login successful 🚀");
    window.location.href = "shop.html";
  } else {
    alert("Wrong credentials ❌");
  }
}
</script>
