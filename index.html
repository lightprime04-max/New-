<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bhumixcore</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins&display=swap" rel="stylesheet">

</head>

<body>

<!-- BACKGROUND -->
<canvas id="bg"></canvas>

<!-- NAV -->
<div class="nav glass">
  <div class="logo">BHUMIXCORE</div>
  <button onclick="goToLogin()" class="btn secondary">Login</button>
</div>

<!-- HERO -->
<section class="hero">
  <h1 class="glow-text">BUILD YOUR DIGITAL EMPIRE</h1>
  <p class="sub">Future. AI. Gaming. Power.</p>

  <div class="buttons">
    <button onclick="goToShop()" class="btn primary">SHOP NOW</button>
    <button onclick="goToStart()" class="btn secondary">GET STARTED</button>
    <button onclick="goToChannel()" class="btn primary">SUBSCRIBE</button>
  </div>
</section>

<!-- FEATURES -->
<section class="features">
  <div class="card glass">⚡ Ultra Fast</div>
  <div class="card glass">🎮 Gaming UI</div>
  <div class="card glass">🤖 AI Powered</div>
</section>

<script src="script.js"></script>
</body>
</html>
